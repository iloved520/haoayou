name: Build Signed APK

on:
  workflow_dispatch:
  push:
    paths:
      - "Legado_Max-beta-3.26.060522-gpt-style-c-rebuild-v2-lintfix.zip"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip source
        run: |
          rm -rf source
          mkdir source
          unzip -q "Legado_Max-beta-3.26.060522-gpt-style-c-rebuild-v2-lintfix.zip" -d source
          ls -la source
          ls -la source/Legado_Max-beta-3.26.060522

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$GITHUB_WORKSPACE/haoayou-release.jks" \
            -storetype JKS \
            -storepass 12345678 \
            -keypass 12345678 \
            -alias haoayou \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=haoayou, OU=iLevody, O=iLevody, L=Unknown, S=Unknown, C=CN"

      - name: Build signed release APK
        working-directory: source/Legado_Max-beta-3.26.060522
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleAppMaxRelease --stacktrace \
            -PRELEASE_STORE_FILE="$GITHUB_WORKSPACE/haoayou-release.jks" \
            -PRELEASE_STORE_PASSWORD=12345678 \
            -PRELEASE_KEY_ALIAS=haoayou \
            -PRELEASE_KEY_PASSWORD=12345678

      - name: Verify APK signature
        run: |
          APK="$(find source/Legado_Max-beta-3.26.060522/app/build/outputs/apk -name '*.apk' | head -n 1)"
          echo "APK=$APK"
          "$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)/apksigner" verify --verbose "$APK"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: haoayou-signed-apk
          path: source/Legado_Max-beta-3.26.060522/app/build/outputs/apk/**/*.apk
